name: "rlsgate"
description: "Block the deploy on Supabase/RLS security holes in vibe-coded apps."
branding:
  icon: "shield"
  color: "yellow"
inputs:
  path:
    description: "Project directory to scan"
    required: false
    default: "."
  fail-on:
    description: "Minimum severity that fails the check (critical|high|medium|low)"
    required: false
    default: "high"
  ai:
    description: "Add AI-drafted fix snippets (requires ANTHROPIC_API_KEY in env)"
    required: false
    default: "false"
runs:
  using: "composite"
  steps:
    - uses: actions/setup-python@v5
      with:
        python-version: "3.x"
    - name: Install rlsgate (pinned to this action ref)
      shell: bash
      run: pip install "${{ github.action_path }}"
    - name: Run rlsgate
      shell: bash
      run: |
        ARGS=""
        if [ "${{ inputs.ai }}" = "true" ]; then ARGS="--ai"; fi
        rlsgate scan "${{ inputs.path }}" --fail-on "${{ inputs.fail-on }}" --no-color $ARGS
